    <script>
      try {
        var th = localStorage.getItem('finance-theme')
        if (th !== 'light' && th !== 'dark') {
          th = matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light'
        }
        document.documentElement.setAttribute('data-theme', th)
        var loc = localStorage.getItem('finance-locale')
        if (loc === 'en' || loc === 'vi') document.documentElement.lang = loc
      } catch (e) {}
    </script>
