name: Deploy Island Vault to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'web/**'
      - 'tools/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Sync Python tools into public/
        run: |
          rm -rf web/public/py/tools
          mkdir -p web/public/py web/public/samples
          cp -a tools web/public/py/tools
          rm -rf web/public/py/tools/__pycache__
          cp -f data/samples/assets.csv web/public/samples/assets.csv
      - name: Install & build
        working-directory: web
        run: |
          npm ci
          npm run build:pages
      - uses: actions/upload-pages-artifact@v3
        with:
          path: web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
